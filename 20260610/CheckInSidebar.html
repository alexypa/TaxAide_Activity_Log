<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <style>
      body { font-family: Arial, sans-serif; padding: 12px; }
      label { display: block; margin-top: 10px; font-weight: bold; }
      input, textarea, select {   /* UPDATED: added select */
        width: 100%; padding: 6px; margin-top: 4px;
        box-sizing: border-box;
      }
      .right-justify { text-align: right; }
      button {
        margin-top: 15px; padding: 10px;
        width: 100%; background: #1976d2; color: white;
        border: none; cursor: pointer; font-size: 14px;
      }
      button:hover { background: #0d47a1; }

      #errorBox {
        display:none;
        background:#b00020;
        color:white;
        padding:10px;
        margin-bottom:10px;
        border-radius:4px;
        font-weight:bold;
      }
    </style>
  </head>

  <body onload="document.getElementById('ticket').focus();">

    <div id="errorBox"></div>

    <label>Ticket #</label>
    <input id="ticket" type="text" class="right-justify"
           oninput="clearError(); autoAdvanceFromTicket()">

    <label>SSN Last 4</label>
    <input id="ssn" type="text" class="right-justify"
           oninput="clearError(); autoAdvanceFromSSN()">

    <label>First Name</label>
    <input id="firstName" type="text" oninput="clearError()">

    <label>Last Name</label>
    <input id="lastName" type="text" oninput="clearError()">

    <label>Tax Return Year</label>

    <!-- UPDATED: input → select -->
    <select id="taxYear" class="right-justify" oninput="clearError()"></select>

    <label>Comments</label>
    <textarea id="comments" oninput="clearError()"></textarea>

    <button onclick="submitForm()">Check In</button>

    <script>

      let dynamicAllowedYears = [];

      google.script.run
        .withSuccessHandler(function(years) {
          dynamicAllowedYears = years;

          const sel = document.getElementById("taxYear");
          sel.innerHTML = "";

          years.forEach(y => {
            const opt = document.createElement("option");
            opt.value = y;
            opt.textContent = y;
            sel.appendChild(opt);
          });

          // ADDED: select the default year automatically
          google.script.run
            .withSuccessHandler(function(defaultYear) {
              sel.value = defaultYear;
            })
            .getDefaultYear();
        })
        .getAllowedYears();

      function showError(msg) {
        const box = document.getElementById("errorBox");
        box.textContent = msg;
        box.style.display = "block";
      }

      function clearError() {
        document.getElementById("errorBox").style.display = "none";
      }

      function submitForm() {
        const ticket = document.getElementById("ticket").value.trim();
        const ssn = document.getElementById("ssn").value.trim();
        const firstName = document.getElementById("firstName").value.trim();
        const lastName = document.getElementById("lastName").value.trim();
        const taxYear = document.getElementById("taxYear").value.trim();  // unchanged
        const comments = document.getElementById("comments").value.trim();

        clearError();

        // Ticket: must be 1–99
        if (!/^\d{1,2}$/.test(ticket)) {
          showError("Ticket number must be 1–99 (digits only).");
          document.getElementById("ticket").focus();
          return;
        }

        // SSN Last 4
        if (!/^\d{4}$/.test(ssn)) {
          showError("Enter the last 4 digits of the taxpayer's SSN.");
          document.getElementById("ssn").focus();
          return;
        }

        // -----------------------------------------
        // REMOVED: manual tax year validation
        // Dropdown guarantees correctness
        // -----------------------------------------

        const data = {
          ticketNumber: ticket,
          ssnLast4: ssn,
          firstName: firstName,
          lastName: lastName,
          taxYear: taxYear,
          comments: comments,
          isAppointment: false
        };

        google.script.run
          .withSuccessHandler(result => {
            if (!result.ok) {
              showError(result.message);
              return;
            }

            document.getElementById("ticket").value = "";
            document.getElementById("ssn").value = "";
            document.getElementById("firstName").value = "";
            document.getElementById("lastName").value = "";
            document.getElementById("taxYear").value = "";
            document.getElementById("comments").value = "";
            document.getElementById("ticket").focus();
          })
          .checkIn(data);
      }

      function autoAdvanceFromTicket() {
        const v = document.getElementById("ticket").value.trim();
        if (/^\d{2}$/.test(v)) document.getElementById("ssn").focus();
      }

      function autoAdvanceFromSSN() {
        const v = document.getElementById("ssn").value.trim();
        if (/^\d{4}$/.test(v)) document.getElementById("firstName").focus();
      }
    </script>
  </body>
</html>
